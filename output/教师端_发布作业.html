<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师端｜发布作业</title>
  <style>
    :root {
      --bg: #f5efe6;
      --panel: rgba(255, 251, 244, 0.94);
      --line: rgba(24, 35, 42, 0.12);
      --ink: #1e2b2f;
      --muted: #607074;
      --accent: #0c6a78;
      --shadow: 0 18px 60px rgba(44, 33, 22, 0.12);
      --warn: #ab4232;
      --ok: #2f7d5c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Source Han Sans SC", "Noto Sans SC", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(177, 101, 43, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(12, 106, 120, 0.14), transparent 30%),
        linear-gradient(180deg, #f8f3ec 0%, #efe5d6 100%);
    }

    .wrap {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 13px;
      letter-spacing: 0.16em;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1, p { margin: 0; }
    h1 {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.08;
    }

    .intro {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(24, 35, 42, 0.08);
      text-decoration: none;
      color: var(--ink);
      background: rgba(255,255,255,0.8);
      font-weight: 700;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #084f59);
      color: #fff;
      border-color: transparent;
    }

    form {
      display: grid;
      gap: 16px;
      margin-top: 24px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(24, 35, 42, 0.14);
      background: rgba(255,255,255,0.82);
      padding: 12px 14px;
      font-size: 14px;
      color: var(--ink);
    }

    .tip {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .alert {
      margin-top: 18px;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 14px;
      line-height: 1.8;
      display: none;
    }

    .alert.ok {
      display: block;
      background: rgba(47, 125, 92, 0.1);
      border: 1px solid rgba(47, 125, 92, 0.18);
      color: var(--ok);
    }

    .alert.warn {
      display: block;
      background: rgba(171, 65, 50, 0.08);
      border: 1px solid rgba(171, 65, 50, 0.16);
      color: var(--warn);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="eyebrow">Teacher Publish</div>
      <h1>发布作业</h1>
      <p class="intro">填写作业名称并上传作业评价标准文件。当前版本为静态流程：发布后会在本地浏览器写入一条作业记录，并回到教师端作业列表页。</p>

      <div class="actions">
        <a class="btn" href="./教师端_作业列表.html">返回作业列表</a>
      </div>

      <form id="publishForm">
        <div class="field">
          <label for="assignmentName">作业名称</label>
          <input id="assignmentName" type="text" placeholder="请输入作业名称">
        </div>

        <div class="field">
          <label for="standardFile">作业评价标准文件</label>
          <input id="standardFile" type="file" accept=".md,.txt,.pdf,.doc,.docx">
          <div class="tip">当前静态版本只记录标准文件名，不上传到服务器。</div>
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">确认发布</button>
        </div>
      </form>

      <div id="alertBox" class="alert"></div>
    </div>
  </div>

  <script src="./teacher-assignments.js"></script>
  <script>
    const form = document.getElementById("publishForm");
    const alertBox = document.getElementById("alertBox");

    function showAlert(type, message) {
      alertBox.className = `alert ${type}`;
      alertBox.innerHTML = message;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = document.getElementById("assignmentName").value.trim();
      const file = document.getElementById("standardFile").files[0];

      if (!name) {
        showAlert("warn", "请先填写作业名称。");
        return;
      }

      if (!file) {
        showAlert("warn", "请上传作业评价标准文件。");
        return;
      }

      window.teacherAssignmentStore.createAssignment({
        name,
        standardFileName: file.name,
        createdAt: new Date().toLocaleDateString("zh-CN")
      });

      showAlert("ok", `作业“${name}”已发布，正在返回作业列表页。`);
      setTimeout(() => {
        window.location.href = "./教师端_作业列表.html";
      }, 700);
    });
  </script>
</body>
</html>
