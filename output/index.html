<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教师端｜作业列表</title>
  <style>
    :root {
      --bg: #f5efe6;
      --panel: rgba(255, 251, 244, 0.94);
      --line: rgba(24, 35, 42, 0.12);
      --ink: #1e2b2f;
      --muted: #607074;
      --accent: #0c6a78;
      --accent-2: #b1652b;
      --good: #2f7d5c;
      --mid: #d18c22;
      --risk: #ab4232;
      --shadow: 0 18px 60px rgba(44, 33, 22, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Source Han Sans SC", "Noto Sans SC", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(177, 101, 43, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(12, 106, 120, 0.14), transparent 30%),
        linear-gradient(180deg, #f8f3ec 0%, #efe5d6 100%);
    }

    .wrap {
      width: min(1320px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .hero, .section {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 26px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 13px;
      letter-spacing: 0.16em;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1, h2, p { margin: 0; }
    h1 {
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.08;
    }

    .hero p {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.75;
      max-width: 940px;
      font-size: 15px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(24, 35, 42, 0.08);
      text-decoration: none;
      color: var(--ink);
      background: rgba(255,255,255,0.8);
      font-weight: 700;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #084f59);
      color: #fff;
      border-color: transparent;
    }

    .section {
      margin-top: 24px;
      padding: 24px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
    }

    th, td {
      padding: 16px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(24, 35, 42, 0.08);
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      background: rgba(255,255,255,0.76);
      font-weight: 700;
    }

    .assignment-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .badge.good { background: var(--good); }
    .badge.mid { background: var(--mid); }

    .ops {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ops .btn {
      min-height: 34px;
      padding: 0 12px;
      font-size: 12px;
    }

    .empty {
      display: none;
      border-radius: 18px;
      border: 1px dashed rgba(24, 35, 42, 0.16);
      background: rgba(255,255,255,0.68);
      padding: 20px;
      color: var(--muted);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Teacher Home</div>
      <h1>教师端作业列表</h1>
      <p>本页记录当前已发布作业。教师可查看作业详情、控制收集状态，并进入发布页面创建新的作业任务。</p>
      <div class="hero-actions">
        <a class="btn primary" href="./教师端_发布作业.html">发布作业</a>
        <a class="btn" href="./学生端_作业批改查询.html">打开学生端查询页</a>
      </div>
    </section>

    <section class="section">
      <h2 style="margin-bottom:16px;">当前发布的作业</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>作业名称</th>
              <th>当前提交人数</th>
              <th>已批改人数</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="assignmentRows"></tbody>
        </table>
      </div>
      <div class="empty" id="emptyState">当前没有已发布作业，请先进入“发布作业”页面创建新作业。</div>
    </section>
  </div>

  <script src="./review-data.js"></script>
  <script src="./teacher-assignments.js"></script>
  <script>
    const rowsEl = document.getElementById("assignmentRows");
    const emptyEl = document.getElementById("emptyState");

    function render() {
      const store = window.teacherAssignmentStore;
      store.syncCurrentReviewCounts(window.reviewData);
      const assignments = store.listAssignments();
      emptyEl.style.display = assignments.length ? "none" : "block";
      rowsEl.innerHTML = assignments.map(item => `
        <tr>
          <td>
            <a class="assignment-link" href="${item.detailPage}?id=${encodeURIComponent(item.id)}">${item.name}</a>
            <div class="meta">
              <span class="badge ${item.collectionOpen ? "good" : "mid"}">${item.collectionOpen ? "收集中" : "未收集"}</span>
              <span>${item.standardFileName || "未记录标准文件"}</span>
            </div>
          </td>
          <td>${item.submittedCount}</td>
          <td>${item.gradedCount}</td>
          <td>${item.createdAt}</td>
          <td>
            <div class="ops">
              <a class="btn" href="${item.detailPage}?id=${encodeURIComponent(item.id)}">查看</a>
              <button class="btn" type="button" onclick="toggleCollection('${item.id}')">${item.collectionOpen ? "停止收集" : "开始收集"}</button>
              <button class="btn" type="button" onclick="deleteAssignment('${item.id}')">删除作业</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function toggleCollection(id) {
      window.teacherAssignmentStore.toggleCollection(id);
      render();
    }

    function deleteAssignment(id) {
      const assignment = window.teacherAssignmentStore.getAssignment(id);
      if (!assignment) return;
      const confirmed = window.confirm(`确认删除作业“${assignment.name}”吗？`);
      if (!confirmed) return;
      window.teacherAssignmentStore.deleteAssignment(id);
      render();
    }

    window.toggleCollection = toggleCollection;
    window.deleteAssignment = deleteAssignment;
    render();
  </script>
</body>
</html>
