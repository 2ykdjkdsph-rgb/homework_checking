<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交作业</title>
  <style>
    :root {
      --bg: #f3ede4;
      --panel: rgba(255, 251, 245, 0.95);
      --line: rgba(23, 34, 40, 0.12);
      --ink: #1d2a2e;
      --muted: #647377;
      --accent: #0b6976;
      --accent-2: #b2602b;
      --ok: #2f7d5c;
      --warn: #ab4132;
      --shadow: 0 18px 60px rgba(46, 34, 21, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Source Han Sans SC", "Noto Sans SC", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(178, 96, 43, 0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(11, 105, 118, 0.14), transparent 28%),
        linear-gradient(180deg, #f7f2eb 0%, #efe6d8 100%);
    }

    .wrap {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 13px;
      letter-spacing: 0.16em;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1, p { margin: 0; }

    h1 {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.08;
    }

    .intro {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(23, 34, 40, 0.12);
      background: rgba(255,255,255,0.82);
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #064b55);
      color: #fff;
      border-color: transparent;
    }

    form {
      display: grid;
      gap: 16px;
      margin-top: 24px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    input[type="text"],
    input[type="file"],
    textarea {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(23, 34, 40, 0.14);
      background: rgba(255,255,255,0.82);
      padding: 12px 14px;
      font-size: 14px;
      color: var(--ink);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.7;
    }

    .tip {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .alert {
      margin-top: 20px;
      border-radius: 18px;
      padding: 16px 18px;
      line-height: 1.8;
      font-size: 14px;
      display: none;
    }

    .alert.ok {
      display: block;
      background: rgba(47, 125, 92, 0.1);
      border: 1px solid rgba(47, 125, 92, 0.18);
      color: var(--ok);
    }

    .alert.warn {
      display: block;
      background: rgba(171, 65, 50, 0.08);
      border: 1px solid rgba(171, 65, 50, 0.16);
      color: var(--warn);
    }

    .list {
      margin: 18px 0 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100% - 20px, 100%);
      }

      .panel {
        padding: 18px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="eyebrow">Submission Portal</div>
      <h1>提交作业</h1>
      <p class="intro">
        本页为静态提交页面，支持选择 PDF、Word、IPYNB 文件作为作业材料。当前版本仅完成前端交互与格式校验，
        不连接后端存储服务；提交后会在本地浏览器中记录一次“待接入后端”的提交信息。
      </p>

      <div class="actions">
        <a class="btn" href="./学生端_作业批改查询.html">返回学生查询页</a>
      </div>

      <ul class="list">
        <li>支持文件格式：.pdf、.doc、.docx、.ipynb</li>
        <li>可一次选择多个文件，用于提交正文、附录或代码附件</li>
        <li>当前页面不真正上传文件，仅验证并记录文件名</li>
      </ul>

      <form id="submitForm">
        <div class="field">
          <label for="studentName">学生姓名</label>
          <input id="studentName" type="text" placeholder="请输入姓名">
        </div>

        <div class="field">
          <label for="studentId">学号</label>
          <input id="studentId" type="text" placeholder="请输入学号">
        </div>

        <div class="field">
          <label for="courseName">课程名称</label>
          <input id="courseName" type="text" value="金融创新与衍生品专题">
        </div>

        <div class="field">
          <label for="homeworkFiles">上传作业文件</label>
          <input id="homeworkFiles" type="file" multiple accept=".pdf,.doc,.docx,.ipynb,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
          <div class="tip">请选择一个或多个作业文件。若包含 Notebook，请上传 .ipynb 文件。</div>
        </div>

        <div class="field">
          <label for="remark">备注说明</label>
          <textarea id="remark" placeholder="可填写补充说明，例如重提版本、文件结构说明、补交原因等。"></textarea>
        </div>

        <div class="actions">
          <button class="btn primary" type="submit">提交</button>
          <button class="btn" type="button" id="clearBtn">清空</button>
        </div>
      </form>

      <div id="alertBox" class="alert"></div>
    </div>
  </div>

  <script>
    const submitForm = document.getElementById("submitForm");
    const alertBox = document.getElementById("alertBox");
    const clearBtn = document.getElementById("clearBtn");
    const fileInput = document.getElementById("homeworkFiles");
    const allowed = [".pdf", ".doc", ".docx", ".ipynb"];

    function showAlert(type, message) {
      alertBox.className = `alert ${type}`;
      alertBox.innerHTML = message;
    }

    function resetForm() {
      submitForm.reset();
      alertBox.className = "alert";
      alertBox.textContent = "";
    }

    submitForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const name = document.getElementById("studentName").value.trim();
      const studentId = document.getElementById("studentId").value.trim();
      const courseName = document.getElementById("courseName").value.trim();
      const remark = document.getElementById("remark").value.trim();
      const files = Array.from(fileInput.files || []);

      if (!name || !studentId || !courseName) {
        showAlert("warn", "请先完整填写学生姓名、学号和课程名称。");
        return;
      }

      if (!files.length) {
        showAlert("warn", "请至少选择一个作业文件后再提交。");
        return;
      }

      const invalid = files.find(file => {
        const lower = file.name.toLowerCase();
        return !allowed.some(ext => lower.endsWith(ext));
      });

      if (invalid) {
        showAlert("warn", `文件 ${invalid.name} 不在允许范围内。当前仅支持：${allowed.join("、")}`);
        return;
      }

      const record = {
        name,
        studentId,
        courseName,
        remark,
        files: files.map(file => ({ name: file.name, size: file.size })),
        submittedAt: new Date().toLocaleString()
      };

      const records = JSON.parse(localStorage.getItem("homework_submissions") || "[]");
      records.push(record);
      localStorage.setItem("homework_submissions", JSON.stringify(records));

      showAlert(
        "ok",
        `已记录一次静态提交。<br>学生：${name}（${studentId}）<br>文件：${files.map(file => file.name).join("、")}<br>正在跳转到作业批改查询页面。`
      );

      setTimeout(() => {
        window.location.href = `./学生端_作业批改查询.html?name=${encodeURIComponent(name)}`;
      }, 800);
    });

    clearBtn.addEventListener("click", resetForm);
  </script>
</body>
</html>
